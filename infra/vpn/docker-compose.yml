# ──────────────────────────────────────────────────────
# Local-Machine — VPN Gateway (WireGuard)
# ──────────────────────────────────────────────────────
# Standalone compose file for the VPN gateway.
# Used by run.sh to manage VPN independently.
# ──────────────────────────────────────────────────────

services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: lm-vpn-gw
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=auto
      - SERVERPORT=${VPN_PORT:-51820}
      - PEERS=player1,player2,player3,player4,player5
      - PEERDNS=auto
      - INTERNAL_SUBNET=${VPN_SUBNET:-10.10.254.0/24}
      - ALLOWEDIPS=10.10.0.0/16
    ports:
      - "${VPN_PORT:-51820}:51820/udp"
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
