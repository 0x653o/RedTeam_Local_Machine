# ──────────────────────────────────────────────────────
# Local-Machine — VPN Gateway (OpenVPN)
# ──────────────────────────────────────────────────────
# HTB-style: players receive a .ovpn file and connect
# with:  sudo openvpn player.ovpn
#
# One-time setup:  ./infra/vpn/setup-ca.sh
# Add player:      ./scripts/add-peer.sh <name>
# ──────────────────────────────────────────────────────

services:
  openvpn:
    image: kylemanna/openvpn:latest
    container_name: lm-vpn-gw
    cap_add:
      - NET_ADMIN
    environment:
      - DEBUG=0
    ports:
      - "${VPN_PORT:-1194}:1194/udp"
    volumes:
      - ./data:/etc/openvpn
    sysctls:
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep openvpn || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
