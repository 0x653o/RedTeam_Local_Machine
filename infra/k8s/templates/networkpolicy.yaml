apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: placeholder   # replaced at apply time per user namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # Default: deny all ingress and egress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vpn-ingress
  namespace: placeholder   # replaced at apply time
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Only allow traffic from this user's VPN-assigned IP
        # Portal backend patches this with the actual VPN IP at namespace creation time
        - ipBlock:
            cidr: "10.8.0.0/24"   # OpenVPN client subnet
            # Portal replaces this with the specific user IP: e.g. 10.8.0.5/32

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: placeholder   # replaced at apply time
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution only (so machines can resolve hostnames internally)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
