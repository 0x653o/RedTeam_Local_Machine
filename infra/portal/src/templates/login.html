<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏴 Local-Machine — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.08) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            pointer-events: none;
        }

        .login-page::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            pointer-events: none;
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand .brand-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .login-brand h1 {
            font-family: var(--font-mono);
            font-size: 24px;
            color: var(--text-primary);
            letter-spacing: 2px;
        }

        .login-brand h1 span {
            color: var(--accent-red);
        }

        .login-brand p {
            color: var(--text-tertiary);
            font-size: 14px;
            margin-top: 8px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .login-form label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-form .form-input {
            padding: 14px 16px;
            font-size: 15px;
        }

        .login-btn {
            margin-top: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px;
            color: var(--accent-red);
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <span class="brand-icon">🏴</span>
                <h1>LOCAL<span>MACHINE</span></h1>
                <p>Advanced Red Team Lab — 42 Machines</p>
            </div>

            <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-player-id">Player ID</label>
                    <input type="text" id="login-player-id" class="form-input" 
                           placeholder="your-handle" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-secret">Lab Secret</label>
                    <input type="password" id="login-secret" class="form-input" 
                           placeholder="Shared lab secret" required autocomplete="current-password">
                </div>
                <div class="login-error" id="login-error"></div>
                <button type="submit" class="btn btn-primary login-btn" id="login-submit-btn">
                    Access Lab →
                </button>
            </form>

            <div class="login-footer">
                Get the lab secret from your admin.
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const playerId = document.getElementById('login-player-id').value.trim();
            const secret = document.getElementById('login-secret').value;
            const errorEl = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit-btn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';
            errorEl.style.display = 'none';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerId, secret }),
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || 'Authentication failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection failed';
                errorEl.style.display = 'block';
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Access Lab →';
        }
    </script>
</body>
</html>
