services:
  react2shell:
    build: { context: ., dockerfile: Dockerfile }
    container_name: lm-22-react2shell
    hostname: react2shell
    environment: [ "FLAG_SEED=${FLAG_SEED:-default-seed}", "MACHINE_ID=22" ]
    networks: { machine_22_net: { ipv4_address: 10.10.22.10 } }
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt: [ "no-new-privileges:false" ]
    healthcheck: { test: ["CMD-SHELL", "/healthcheck.sh"], interval: 30s, timeout: 10s, retries: 3, start_period: 60s }

networks:
  machine_22_net:
    driver: bridge
    ipam: { config: [{ subnet: 10.10.22.0/24, gateway: 10.10.22.1 }] }
