services:
  ghostcat:
    build: { context: ., dockerfile: Dockerfile }
    container_name: lm-07-ghostcat
    hostname: ghostcat
    environment: [ "FLAG_SEED=${FLAG_SEED:-default-seed}", "MACHINE_ID=07" ]
    networks: { machine_07_net: { ipv4_address: 10.10.7.10 } }
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt: [ "no-new-privileges:false" ]
    healthcheck: { test: ["CMD-SHELL", "/healthcheck.sh"], interval: 30s, timeout: 10s, retries: 3, start_period: 60s }

networks:
  machine_07_net:
    driver: bridge
    ipam: { config: [{ subnet: 10.10.7.0/24, gateway: 10.10.7.1 }] }
