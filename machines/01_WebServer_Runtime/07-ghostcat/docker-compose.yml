# ──────────────────────────────────────────────────────
# Machine 07: GhostCat — CVE-2020-1938
# CVSS: 9.8 | Category: Web Server & Runtime
# Kill Chain: nmap → AJP 8009 + HTTP 8080 → Ghostcat file read
#             → WEB-INF/web.xml creds → Manager WAR deploy → root
# ──────────────────────────────────────────────────────

services:
  ghostcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lm-07-ghostcat
    hostname: ghostcat
    environment:
      - FLAG_SEED=${FLAG_SEED:-default-seed}
      - MACHINE_ID=07
    networks:
      machine_07_net:
        ipv4_address: 10.10.7.10
    ports: []
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD-SHELL", "/healthcheck.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s

networks:
  machine_07_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.7.0/24
          gateway: 10.10.7.1
