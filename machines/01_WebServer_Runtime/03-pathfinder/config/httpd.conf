# Apache 2.4.49 Configuration — INTENTIONALLY VULNERABLE
# CVE-2021-41773: Path traversal via URL-encoded dot sequences
#
# The vulnerability exists because Apache 2.4.49's path normalization
# fails to properly handle %2e (dot) sequences, allowing directory
# traversal OUTSIDE the document root.

ServerRoot "/opt/apache2"
Listen 80
ServerName pathfinder:80

# Required modules
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule authz_host_module modules/mod_authz_host.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule cgid_module modules/mod_cgid.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so

User daemon
Group daemon

# VULNERABLE: "Require all granted" on the document root
# Combined with the path traversal bug, this allows reading files
# outside the document root
<Directory />
    AllowOverride None
    Require all denied
</Directory>

DocumentRoot "/opt/apache2/htdocs"
<Directory "/opt/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# CGI Configuration — CRITICAL for RCE
# Path traversal + CGI = Remote Code Execution
ScriptAlias /cgi-bin/ "/opt/apache2/cgi-bin/"
<Directory "/opt/apache2/cgi-bin">
    AllowOverride None
    Options +ExecCGI
    Require all granted
</Directory>

# Logging
ErrorLog "logs/error_log"
LogLevel warn

<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b" common
    CustomLog "logs/access_log" common
</IfModule>

# MIME types
<IfModule mime_module>
    TypesConfig conf/mime.types
    AddType application/x-compress .Z
    AddType application/x-gzip .gz .tgz
</IfModule>

# Directory index
<IfModule dir_module>
    DirectoryIndex index.html
</IfModule>
