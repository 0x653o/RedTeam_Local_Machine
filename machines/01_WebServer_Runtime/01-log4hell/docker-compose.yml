# ──────────────────────────────────────────────────────
# Machine 01: Log4Hell — CVE-2021-44228 (Log4Shell)
# ──────────────────────────────────────────────────────
# CVSS: 10.0 | Category: Web Server & Runtime
# Kill Chain: nmap → Java webapp on 8080 → Log4j JNDI → 
#             Reverse shell → SUID binary → root flag
# ──────────────────────────────────────────────────────

services:
  log4hell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lm-01-log4hell
    hostname: log4hell
    environment:
      - FLAG_SEED=${FLAG_SEED:-default-seed}
      - MACHINE_ID=01
    networks:
      machine_01_net:
        ipv4_address: 10.10.1.10
    ports: []  # No exposed ports — access via VPN only
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:false  # Needed for SUID exploitation
    healthcheck:
      test: ["CMD-SHELL", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  machine_01_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.1.0/24
          gateway: 10.10.1.1
