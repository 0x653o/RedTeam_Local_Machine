<VirtualHost *:80>
    ServerAdmin admin@phpocalypse.local
    DocumentRoot /var/www/html
    ServerName phpocalypse.local

    # Route PHP files through php-cgi binary (VULNERABLE setup)
    # CVE-2012-1823: query string args passed to php-cgi as CLI options
    ScriptAlias /cgi-bin/ /usr/lib/cgi-bin/
    Action php-cgi /cgi-bin/php-cgi
    AddHandler php-cgi .php

    <Directory /var/www/html>
        Options +ExecCGI -Indexes
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    <Directory /usr/lib/cgi-bin>
        Options +ExecCGI
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
