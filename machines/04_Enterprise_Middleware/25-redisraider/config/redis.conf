# Redis Configuration — INTENTIONALLY VULNERABLE
# No authentication, no protected-mode, binds to all interfaces

bind 0.0.0.0
port 6379
# protected-mode is OFF — allows remote connections without auth
protected-mode no
# No requirepass = no authentication needed
# requirepass <disabled>
daemonize no
loglevel notice
logfile /var/log/redis/redis-server.log
dir /var/lib/redis
dbfilename dump.rdb
