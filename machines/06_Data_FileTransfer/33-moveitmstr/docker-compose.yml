services:
  moveitmstr:
    build: { context: ., dockerfile: Dockerfile }
    container_name: lm-33-moveitmstr
    hostname: moveitmstr
    environment: [ "FLAG_SEED=${FLAG_SEED:-default-seed}", "MACHINE_ID=33" ]
    networks: { machine_33_net: { ipv4_address: 10.10.33.10 } }
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt: [ "no-new-privileges:false" ]
    healthcheck: { test: ["CMD-SHELL", "/healthcheck.sh"], interval: 30s, timeout: 10s, retries: 3, start_period: 60s }

networks:
  machine_33_net:
    driver: bridge
    ipam: { config: [{ subnet: 10.10.33.0/24, gateway: 10.10.33.1 }] }
